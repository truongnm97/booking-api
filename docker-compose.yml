services:
  dev-db:
    image: mongo
    container_name: dev-db
    environment:
      - MONGO_INITDB_DATABASE=booking
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    ports:
      - 27017:27017
    networks:
      - nestjs-net
  
  redis-dev:
    image: redis:latest
    container_name: redis-dev
    ports:
      - 6379:6379
    volumes:
      - redis-dev:/data
    command: ["redis-server", "--requirepass", "example"]

  test-db:
    image: mongo
    container_name: test-db
    environment:
      - MONGO_INITDB_DATABASE=test
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    ports:
      - 27018:27017
    networks:
      - nestjs-net
networks:
  nestjs-net:
volumes:
  redis-dev:
